# @package _global_
defaults:
  - /task/sharpa_inhand/mujoco
  - _self_

teacher:
  algo_family: appo
  task: sharpa_inhand/mujoco_hora

training:
  task_name: SharpaInhandRotation
  sim_backend: mujoco
  render_spacing: 0.5
  cam_distance: 1.5
  cam_lookat: [0.75, 0.75, 0.4]
  cam_elevation: -20.0
  cam_azimuth: 90.0

interactive:
  action_mode: policy
  policy_obs_mode: actor
  show_target_bodies: false
  show_reward_debug: false
  target_show_axes: false
  target_body_names: ""
  target_max_bodies: 0
  target_marker_radius: 0.02
  target_axis_length: 0.08
  target_marker_alpha: 0.75
  reward_debug_show_velocity: false
  reward_debug_lin_vel_scale: 0.08
  reward_debug_ang_vel_scale: 0.05
  reward_debug_show_connectors: false
  reward_debug_show_global_anchor: false
  camera_follow_body: true
  camera_focus_body_name: ""
  camera_height_offset: 0.15
  camera_distance: 1.5
  camera_elevation: -20.0
  camera_azimuth: 90.0
  use_env_visual_model: true
  speed: 1.0
  start_paused: false
  keyboard: false
  keyboard_step_lin: 0.1
  keyboard_step_ang: 0.2

env:
  post_step_forward_sensor: true
  domain_rand:
    scale_list: [0.8, 0.9, 1.0, 1.1, 1.2, 1.3, 1.4, 1.5]
    randomize_base_mass: false
    added_mass_range: [0.0, 0.0]
    random_com: false
    com_offset_x: [0.0, 0.0]
    randomize_gravity: false
    randomize_gravity_direction: false
    randomize_pd_gains: false
    randomize_friction: false
    randomize_com: false
    randomize_mass: false
    force_scale: 0.0
    random_force_prob_scalar: 0.0
    joint_noise_scale: 0.0
    contact_latency: 0.0
    contact_sensor_noise: 0.0

algo:
  algo_log_name: hora_distill
  num_envs: 16384
  max_agent_steps: 100000000
  save_interval_steps: 10000000
