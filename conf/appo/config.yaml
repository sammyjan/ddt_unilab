defaults:
  - _self_
  - task: go1_joystick_flat/mujoco

algo:
  algo: appo
  algo_log_name: appo
  seed: 1
  num_envs: 2048
  steps_per_env: 24
  max_iterations: 150
  save_interval: 50
  load_run: "-1"
  obs_groups:
    actor:
      policy: 0
  actor:
    class_name: rsl_rl.models.MLPModel
    hidden_dims: [512, 256, 128]
    activation: elu
    obs_normalization: false
    distribution_cfg:
      class_name: rsl_rl.modules.distribution.GaussianDistribution
      init_std: 1.0
      std_type: scalar
  critic:
    class_name: rsl_rl.models.MLPModel
    hidden_dims: [512, 256, 128]
    activation: elu
    obs_normalization: false
  algorithm:
    num_learning_epochs: 5
    num_mini_batches: 4
    clip_param: 0.2
    gamma: 0.99
    lam: 0.95
    value_loss_coef: 1.0
    entropy_coef: 0.01
    learning_rate: 1.0e-3
    max_grad_norm: 1.0
    use_clipped_value_loss: true
    schedule: adaptive
    desired_kl: 0.01
    adaptive_kl_factor: 1.2
    adaptive_lr_factor: 1.1
    optimizer: adam
    tau: 1.0
    target_update_freq: 1
    vtrace_clip_rho: 1.0
    vtrace_clip_c: 1.0
    enable_compile: false

training:
  task_name: Go1JoystickFlat
  device: null
  collector_device: null
  logger: tensorboard
  wandb_project: unilab
  wandb_entity: null
  wandb_group: null
  wandb_job_type: null
  wandb_name: null
  wandb_tags: []
  wandb_notes: null
  wandb_mode: null
  sim_backend: mujoco
  nan_guard:
    enabled: true
    buffer_size: 100
    max_envs_to_dump: 5
    output_dir: null
  log_root: null
  log_dir: null
  play_only: false
  no_play: false
  sim2sim_strict: true
  play_render_mode: auto
  play_env_num: 16
  play_steps: 150
  cam_distance: 6.0
  cam_elevation: -20.0
  cam_azimuth: 90.0
  cam_tracking: false
  cam_tracking_env_idx: 0
  cam_tracking_extra_envs: 2
  replay_queue_size: null

interactive:
  action_mode: zero
  policy_obs_mode: auto
  show_target_bodies: false
  show_reward_debug: false
  target_show_axes: false
  target_body_names: ""
  target_max_bodies: 0
  target_marker_radius: 0.02
  target_axis_length: 0.08
  target_marker_alpha: 0.75
  reward_debug_show_velocity: false
  reward_debug_lin_vel_scale: 0.08
  reward_debug_ang_vel_scale: 0.05
  reward_debug_show_connectors: false
  reward_debug_show_global_anchor: false
  camera_follow_body: true
  camera_focus_body_name: ""
  camera_height_offset: 0.15
  camera_distance: null
  camera_elevation: null
  camera_azimuth: null
  use_env_visual_model: true
  speed: 1.0
  start_paused: false
  keyboard: false
  keyboard_step_lin: 0.1
  keyboard_step_ang: 0.2

env:
  post_step_forward_sensor: false

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
  job_logging:
    root:
      handlers: [console]
